<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil - Técnico en Programación</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="sdv">
    <div class="hdr">
      <div class="hdr-left">
        <div class="hdr-profile">
          <div class="hdr-ptitle">&#9632; PROFILE</div>
          <div class="hdr-date">DATE: <span id="fecha"></span></div>
        </div>
      </div>
      <div class="hdr-sign">
        <div class="hdr-title">TECNICO<br>EN PROG.</div>
      </div>
    </div>

    <div class="maingrid">
      <div class="inforow">
        <div class="icard"><div class="lbl">&#9632; GENERACION</div><div class="val">Gen Z </div></div>
        <div class="icard"><div class="lbl">&#9632; STACK</div><div class="val">Python / JS / SQL</div></div>
        <div class="icard"><div class="lbl">&#9632; MASCOTA</div><div class="val">Rubber Duck &#128038;</div></div>
        <div class="icard"><div class="lbl">&#9632; ESPECIALIDAD</div><div class="val">Full-Stack</div></div>
      </div>

      <div class="avatar-side">
        <div class="frame">
          <div class="avbox" id="avatarFoto">
             </div>
          <div class="nameplate">Maia Ramirez</div>
        </div>
        <div class="farms">
          <div class="ftitle">&#127806; PROYECTOS</div>
          <div class="fitem"><span class="pdot star"></span><span class="ptxt">Proyecto A</span></div>
          <div class="fitem"><span class="pdot leaf"></span><span class="ptxt">Proyecto B</span></div>
        </div>
      </div>
    </div>

    <div class="skills">
      <div class="stitle">&#9876; HABILIDADES</div>
      <div class="sbadges" id="badgeContainer"></div>
    </div>

    <div class="ground"></div>
    <div class="footer">STARDREW STYLE PORTFOLIO</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
